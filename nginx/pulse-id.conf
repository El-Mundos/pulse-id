# ──────────────────────────────────────────────────────────────
# Pulse ID — Production Nginx Configuration
# ──────────────────────────────────────────────────────────────

# Rate limiting zones
# Auth endpoints: max 10 requests/minute per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
# API endpoints: max 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
# General: max 120 requests/minute per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name pulse-id.ddns.net;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name pulse-id.ddns.net;

    # ── TLS ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pulse-id.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulse-id.ddns.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-XSS-Protection             "1; mode=block" always;

    # Hide server version
    server_tokens off;

    # ── Auth endpoints — strict rate limiting ─────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000/auth/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API — standard rate limiting ──────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── AcmeCorp mock platform (demo) ─────────────────────────
    location /example/ {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://127.0.0.1:8001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Next.js) ────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
