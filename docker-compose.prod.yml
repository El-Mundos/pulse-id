services:
  postgres:
    image: postgres:15-alpine
    container_name: pulse_id_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulse_id}
      POSTGRES_USER: ${POSTGRES_USER:-pulse_id}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Not exposed to host — backend reaches it via Docker internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse_id}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulse_id_backend
    restart: unless-stopped
    # Bind to localhost only — nginx proxies /api/ externally
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pulse_id}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse_id}
      - CORS_ORIGINS=https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: pulse_id_frontend
    restart: unless-stopped
    # Bind to localhost only — nginx proxies / externally
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
